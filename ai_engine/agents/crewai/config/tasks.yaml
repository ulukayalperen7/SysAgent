analysis_task:
  description: >
    Analyze the user prompt: "{user_prompt}". 
    Review the metrics: {metrics}.
    Determine the INTENT (ACTION, INFO, or CHAT). 
    If ACTION, identify the exact TARGET application.
  expected_output: >
    A clear statement: "INTENT: [Type]. TARGET: [Name or NONE]." 
  agent: metric_analyst

diagnostic_task:
  description: >
    Read the output from analysis_task.
    - IF INTENT IS ACTION: Use the System Audit Tool to find the TARGET's PID.
    - IF INTENT IS INFO/CHAT: Do nothing. Output "No investigation needed."
  expected_output: >
    PID/Network data if ACTION. "No investigation needed" if INFO/CHAT.
  agent: log_investigator

reporting_task:
  description: >
    Read all previous context.
    1. If the user asked for system stats (INFO), answer ONLY what they asked briefly based on: {metrics}.
    2. If the user wants to close an app (ACTION), give a 1-2 sentence risk warning and provide the EXACT command to kill the TARGET.
    
    Format strictly as:
    Explanation: <Your short response>
    Script: <OS Command or NONE>
  expected_output: >
    Exactly two lines starting with "Explanation:" and "Script:".
  agent: chief_reporter
