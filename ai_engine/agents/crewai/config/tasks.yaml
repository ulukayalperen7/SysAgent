analysis_task:
  description: >
    Analyze the user prompt: "{user_prompt}" considering the recent conversation history:
    {history}
    and the base system metrics: {metrics}.
    Determine exactly what the user is trying to achieve. Resolve pronouns like "it" or "that" based on the context of the conversation history.
    Extract any specific application names mentioned.
  expected_output: >
    A clear summary of the user's defined goal and target applications.
  agent: metric_analyst

diagnostic_task:
  description: >
    Read the output from analysis_task. Use your tools to accomplish the user's goal.
    - If they ask about running processes or specific apps, USE the 'System Audit Tool'.
    - If they ask about ports or network, USE the 'Network Audit Tool'.
    - If they want to open an app, you do NOT need a tool! Just identify the exact application name so the reporting agent can generate the launch command.
    - If they want to close or kill an app, you DO NOT need a close tool! Just USE the 'System Audit Tool' to find all identifiers (exact process name and PIDs) so the reporting agent can generate the best termination command.
    Gather all necessary facts to answer the user's question completely but concisely.
  expected_output: >
    A comprehensive report of the tool outputs, or action confirmations, relevant to the user's query.
  agent: log_investigator

security_task:
  description: >
    Review the diagnostic report. If the user's goal involves KILLING or CLOSING an application,
    provide a safety warning and the exact PID to kill.
    If it's just gathering info or opening apps, declare it SAFE.
  expected_output: >
    Risk assessment and the required OS commands (if any).
  agent: security_auditor

reporting_task:
  description: >
    Generate the final response to the user.
    Use the diagnostic findings, the base system metrics: {metrics}, and the OS Type: {os_type} to answer the question directly. 
    If the user asks for overall CPU or RAM, grab it from the {metrics}.
    Do not dump raw unstructured data; be conversational but concise.
    If the user asked for a specific number of items (e.g., "top 3 apps"), you MUST respect that limit and filter the data.
    
    SCRIPT GENERATION RULES (follow strictly based on {os_type}):
    - If OS is Windows, you MUST generate valid PowerShell commands ONLY. Never use CMD-style commands.
      - To OPEN an app: Use `Start-Process "AppName:"` (e.g., `Start-Process "spotify:"`). Wait, appending a colon (like a URI scheme) works best for Windows Store apps. If it's a known traditional .exe like notepad, `Start-Process "notepad.exe"` is fine. When in doubt for modern apps like Spotify or WhatsApp, append `:`.
        Do NOT use `start AppName`, `start appname.exe`, or any CMD syntax.
      - To CLOSE/KILL an app: Use `Stop-Process -Name "processname" -Force` or `taskkill /IM processname.exe /F /T`.
      - To CHECK processes: Use `Get-Process "name"`.
    - If OS is Linux/macOS, use bash commands (e.g., `spotify &`, `pkill spotify`).
    
    MUST be formatted strictly as:
    Explanation: <Your tailored, human-readable response>
    Script: <The valid command per the rules above. If no action is needed, output NONE.>
  expected_output: >
    Exactly two lines matching the "Explanation:" and "Script:" format.
  agent: chief_reporter
