spring.application.name=sysagent-backend
server.port=8080

# Import local secrets from ignored external files. Do not package secret files
# into the application artifact.
spring.config.import=optional:file:./application-secret.properties,optional:file:./src/main/resources/application-secret.properties,optional:file:./backend/application-secret.properties,optional:file:./backend/src/main/resources/application-secret.properties

# Database general settings (Credentials moved to application-secret.properties)
spring.datasource.driverClassName=org.postgresql.Driver
# Supabase/PgBouncer transaction pooling can reuse connection state in ways
# that conflict with long-lived JDBC sessions and server-side prepared
# statements. Keep the pool small and short-lived for the local desktop app.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SYSAGENT_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SYSAGENT_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# AI Engine (FastAPI + CrewAI) — URL and HTTP client timeouts (ms)
ai.engine.url=http://localhost:8001
ai.engine.connect-timeout-ms=5000
ai.engine.read-timeout-ms=45000
ai.engine.api-key=${SYSAGENT_AI_ENGINE_API_KEY:}

# Public backend URL shown in node bootstrap commands.
sysagent.public-backend-url=${SYSAGENT_PUBLIC_BACKEND_URL:http://localhost:8080}

# Auth. Set SYSAGENT_AUTH_JWT_SECRET in production. If empty, a process-local
# random secret is used and tokens expire on backend restart.
sysagent.auth.jwt-secret=${SYSAGENT_AUTH_JWT_SECRET:}
sysagent.auth.jwt-expiration-seconds=${SYSAGENT_AUTH_JWT_EXPIRATION_SECONDS:86400}

# Security hardening. Set SYSAGENT_PRODUCTION=true outside local development.
sysagent.security.production=${SYSAGENT_PRODUCTION:false}
sysagent.security.trust-forwarded-for=${SYSAGENT_TRUST_FORWARDED_FOR:false}
sysagent.security.cors.allowed-origins=${SYSAGENT_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
sysagent.security.auth-rate-limit.login-max-attempts=${SYSAGENT_LOGIN_MAX_ATTEMPTS:10}
sysagent.security.auth-rate-limit.login-window-seconds=${SYSAGENT_LOGIN_WINDOW_SECONDS:600}
sysagent.security.auth-rate-limit.register-max-attempts=${SYSAGENT_REGISTER_MAX_ATTEMPTS:5}
sysagent.security.auth-rate-limit.register-window-seconds=${SYSAGENT_REGISTER_WINDOW_SECONDS:1800}
