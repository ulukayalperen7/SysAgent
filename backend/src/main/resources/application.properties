spring.application.name=sysagent-backend
server.port=8080

# Include secrets from application-secret.properties (which is in .gitignore)
spring.profiles.include=secret

# Database general settings (Credentials moved to application-secret.properties)
spring.datasource.driverClassName=org.postgresql.Driver
# Supabase/PgBouncer transaction pooling can reuse connection state in ways
# that conflict with long-lived JDBC sessions and server-side prepared
# statements. Keep the pool small and short-lived for the local desktop app.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# AI Engine (FastAPI + CrewAI) — URL and HTTP client timeouts (ms)
ai.engine.url=http://localhost:8001
ai.engine.connect-timeout-ms=5000
ai.engine.read-timeout-ms=300000
