spring.application.name=sysagent-backend
server.port=8080

# Include secrets from application-secret.properties (which is in .gitignore)
spring.profiles.include=secret

# Database general settings (Credentials moved to application-secret.properties)
spring.datasource.driverClassName=org.postgresql.Driver
# Supabase/PgBouncer transaction pooling can reuse connection state in a way
# that conflicts with PostgreSQL JDBC server-side prepared statements.
# Disabling the prepare threshold prevents "prepared statement S_1 already exists"
# crashes during task creation while keeping the existing database model intact.
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# AI Engine (FastAPI + CrewAI) — URL and HTTP client timeouts (ms)
ai.engine.url=http://localhost:8001
ai.engine.connect-timeout-ms=5000
ai.engine.read-timeout-ms=300000
