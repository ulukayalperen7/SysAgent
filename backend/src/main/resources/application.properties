spring.application.name=sysagent-backend
server.port=8080

# PostgreSQL Supabase (Transaction Pooler)
spring.datasource.url=jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?user=postgres.REDACTED&pwd_redacted=REDACTED
spring.datasource.username=postgres.REDACTED
spring.datasource.pwd_redacted=REDACTED
spring.datasource.driverClassName=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
