spring.application.name=sysagent-backend
server.port=8080

# Include secrets from application-secret.properties (which is in .gitignore)
spring.profiles.include=secret

# Database general settings (Credentials moved to application-secret.properties)
spring.datasource.driverClassName=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# AI Engine (FastAPI + CrewAI) — URL and HTTP client timeouts (ms)
ai.engine.url=http://localhost:8001
ai.engine.connect-timeout-ms=5000
ai.engine.read-timeout-ms=120000
