<div class="terminal-container">
  <div class="terminal-header">
    <div class="mac-btns">
      <span class="btn close"></span>
      <span class="btn min"></span>
      <span class="btn max"></span>
    </div>
    <div class="title">sysagent@local:~</div>
  </div>

  <div class="terminal-body font-mono" #terminalBody>
    <div *ngFor="let log of logs" class="log-entry" [ngClass]="log.type || 'info'">
      <div class="log-line">
        <span class="sender"
          [ngClass]="{'user-tag': log.sender === 'user', 'ai-tag': log.sender === 'ai', 'sys-tag': log.sender === 'system'}">
          [{{ log.sender }}]
        </span>
        <span class="log-text">{{ log.text }}</span>
      </div>
      <div *ngIf="log.script && !log.executed" class="script-container">
        <pre class="script-block">{{ log.script }}</pre>
        <button class="btn-execute" *ngIf="log.taskId" [disabled]="log.executing" (click)="executeScript(log)">
          {{ log.executing ? 'Executing...' : 'Approve & Run locally' }}
        </button>
      </div>
      <div *ngIf="log.executed" class="execution-badge success">
        ✅ Action Completed Successfully
      </div>
    </div>
  </div>

  <div class="terminal-input-area font-mono">
    <span class="prompt">sysagent@local:~$</span>
    <div class="input-wrapper">
      <input #termInput type="text" placeholder="Type a command or natural language intent..."
        (keyup.enter)="onCommandEnter($event)" [disabled]="isThinking || isExecuting" autocomplete="off" autofocus>

      <button class="send-btn" (click)="onSendClick(termInput)"
        [disabled]="isThinking || isExecuting || !termInput.value.trim()">
        <span *ngIf="!isThinking && !isExecuting">➤</span>
        <div *ngIf="isThinking || isExecuting" class="thinking-dots">
          <span>.</span><span>.</span><span>.</span>
        </div>
      </button>
    </div>
  </div>
</div>
