<div class="terminal-container">
  <div class="terminal-header">
    <div class="mac-btns">
      <span class="btn close"></span>
      <span class="btn min"></span>
      <span class="btn max"></span>
    </div>
    <div class="title">sysagent@local:~</div>
  </div>

  <div class="terminal-body font-mono">
    <div *ngFor="let log of logs" class="log-entry">
        <div class="log-line" 
             [ngClass]="{'user': log.sender === 'user', 'sys': log.sender === 'system', 'ai': log.sender === 'ai', 'error': log.type === 'error'}">
            <span class="sender" *ngIf="log.sender !== 'system'">[{{ log.sender }}]</span> {{ log.text }}
        </div>
        <pre *ngIf="log.script" class="script-block">{{ log.script }}</pre>
    </div>
  </div>

  <div class="terminal-input-area font-mono">
    <span class="prompt">sysagent@local:~$</span>
    <input type="text" 
           placeholder="Type a command or natural language intent..." 
           (keyup.enter)="onCommandEnter($event)"
           autocomplete="off"
           autofocus>
  </div>
</div>
