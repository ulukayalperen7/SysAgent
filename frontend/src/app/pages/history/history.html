<div class="history-container">
  <header class="history-header">
    <div>
      <h2>Execution History & Rollbacks</h2>
      <p class="subtitle">
        Every row represents a SysAgent task. Destructive actions are quarantined and can be rolled
        back using the <strong>Undo</strong> action where available.
      </p>
    </div>
    <div class="status-legend">
      <span class="legend-item"><span class="dot completed"></span>Completed</span>
      <span class="legend-item"><span class="dot rolled_back"></span>Rolled Back</span>
      <span class="legend-item"><span class="dot pending"></span>Pending</span>
      <span class="legend-item"><span class="dot failed"></span>Failed</span>
    </div>
  </header>
  
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Task ID</th>
          <th>Date</th>
          <th>Intent</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let task of tasks">
          <td class="font-mono">{{ task.id }}</td>
          <td>{{ task.date }}</td>
          <td>{{ task.intent }}</td>
          <td>
            <app-status-badge [status]="task.status"></app-status-badge>
          </td>
          <td>
            <app-action-btn 
              *ngIf="task.canUndo" 
              label="Undo" 
              type="danger" 
              (onClick)="handleUndo(task.id)">
            </app-action-btn>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
