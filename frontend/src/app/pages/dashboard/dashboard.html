<div class="dashboard-page">

  <header class="dashboard-header">
    <div>
      <h1>Dashboard <span *ngIf="metrics" style="font-size: 0.5em; font-weight: normal; color: #8b949e;">({{metrics.osName}} {{metrics.osVersion}})</span></h1>
      <p class="subtitle">Real-time system overview and AI command terminal</p>
    </div>
    <div class="status-indicator">
      <span class="pulse" [class.offline]="!metrics"></span>
      <span class="status-text">{{ metrics ? 'Agent Online' : 'Connecting...' }}</span>
    </div>
  </header>

  <div class="metrics-row" *ngIf="metrics">
    <!-- CPU Usage -->
    <app-metric-card 
      title="CPU Usage ({{metrics.cpuCores || '?'}} Cores)" 
      [value]="metrics.cpuUsage || 0 | number:'1.0-1'" 
      unit="%" 
      color="#00d2ff">
    </app-metric-card>
    
    <!-- RAM Usage -->
    <app-metric-card 
      title="RAM Usage" 
      [value]="((metrics.usedRam || 0) | bytes:1).split(' ')[0]" 
      [unit]="((metrics.usedRam || 0) | bytes:1).split(' ')[1] + ' / ' + ((metrics.totalRam || 0) | bytes:1)" 
      color="#3fb950">
    </app-metric-card>
    
    <!-- Disk Usage -->
    <app-metric-card 
      title="System Storage" 
      [value]="((metrics.totalDisk - metrics.usedDisk) || 0 | bytes:1).split(' ')[0]" 
      [unit]="((metrics.totalDisk - metrics.usedDisk) || 0 | bytes:1).split(' ')[1] + ' / ' + ((metrics.totalDisk || 0) | bytes:1)" 
      color="#d29922">
    </app-metric-card>

    <!-- Uptime -->
    <app-metric-card 
      title="Backend Uptime" 
      [value]="(metrics.systemUptimeSeconds || 0) / 60 | number:'1.0-0'" 
      unit="mins" 
      color="#a371f7">
    </app-metric-card>
  </div>

  <div class="terminal-section">
    <app-terminal-window></app-terminal-window>
  </div>

</div>
